<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quartz RTE</title>
    <!-- Include Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto"
      rel="stylesheet"
    />
    <link
      href="https://fonts.cdnfonts.com/css/times-new-roman"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inconsolata&family=Montserrat&family=Poppins&family=Roboto&display=swap");
      /* And other fonts */
    </style>
    <!-- Include Quill stylesheet -->
    <link
      href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css"
      rel="stylesheet"
    />
    <!-- Include highlight.js stylesheet for highlighting code syntax -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
      rel="stylesheet"
    />
    
    <!-- Bootstrap Components -->
    <link rel="stylesheet" href="Bootstrap/sidebars.css" />
    
    <!-- Basic Styles -->
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #212529;
        --border-color: #dee2e6;
        --primary-color: #007bff;
        --secondary-color: #6c757d;
      }
      
      body {
        font-family: 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
      }
      
      header {
        background: var(--bg-color);
        border-bottom: 1px solid var(--border-color);
        padding: 0.5rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      
      #title {
        margin: 0;
        flex: 1;
        text-align: center;
      }
      
      .main {
        height: calc(100vh - 60px);
        padding: 1rem;
      }
      
      #editor {
        height: 100%;
      }
      
      .toolbar-section {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      
      .toolbar-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }
      
      .toolbar-btn:hover {
        background: #0056b3;
      }
      
      .toolbar-btn.active {
        background: #28a745;
      }
    </style>
    
    <!-- Include the highlight.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Include the Quill library -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  </head>
  
  <body>
    <header>
      <button class="sidebar-toggle toolbar-btn">☰ Menu</button>
      <svg
        height="32px"
        version="1.1"
        viewBox="0 0 32 32"
        width="32px"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:sketch="http://www.bohemiancoding.com/sketch/ns"
        xmlns:xlink="http://www.w3.org/1999/xlink"
      >
        <title />
        <desc />
        <defs />
        <g
          fill="none"
          fill-rule="evenodd"
          id="rtf-doc"
          stroke="none"
          stroke-width="1"
        >
          <g fill="#887a7a" id="icon-rtf">
            <path
              d="M21,26 L21,28.0025781 C21,29.1090746 20.1057238,30 19.0025781,30 L3.99742191,30 C2.89092539,30 2,29.1012878 2,27.9926701 L2,5.00732994 C2,3.89833832 2.8992496,3 4.0085302,3 L14,3 L14,9.00189865 C14,10.1132936 14.8980806,11 16.0059191,11 L21,11 L21,13 L12.0068483,13 C10.3462119,13 9,14.3422643 9,15.9987856 L9,23.0012144 C9,24.6573979 10.3359915,26 12.0068483,26 L21,26 L21,26 Z M15,3 L15,8.99707067 C15,9.55097324 15.4509752,10 15.990778,10 L21,10 L15,3 L15,3 Z M11.9945615,14 C10.8929956,14 10,14.9001762 10,15.992017 L10,23.007983 C10,24.1081436 10.9023438,25 11.9945615,25 L29.0054385,25 C30.1070044,25 31,24.0998238 31,23.007983 L31,15.992017 C31,14.8918564 30.0976562,14 29.0054385,14 L11.9945615,14 L11.9945615,14 Z M13.7999878,20 L13,20 L13,23 L12,23 L12,18 L12,16 L14.9951185,16 C16.1061002,16 17,16.8954305 17,18 C17,19.1106358 16.1050202,19.9973904 14.9999986,19.9999943 L17,23 L15.7999878,23 L13.7999878,20 L13.7999878,20 Z M13,17 L13,19 L15.0010434,19 C15.5527519,19 16,18.5561352 16,18 C16,17.4477153 15.5573397,17 15.0010434,17 L13,17 L13,17 Z M20,17 L20,23 L21,23 L21,17 L23,17 L23,16 L18,16 L18,17 L20,17 L20,17 Z M25,19 L25,17 L29,17 L29,16 L24,16 L24,23 L25,23 L25,20 L28,20 L28,19 L25,19 L25,19 Z"
              id="document-file-rtf"
            />
          </g>
        </g>
      </svg>
      <h4 id="title">Quartz RTE</h4>
      <div></div> <!-- Spacer for flex layout -->
    </header>
    
    <!-- Basic Toolbar -->
    <div class="toolbar-section">
      <button class="toolbar-btn" id="btn-bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
      <button class="toolbar-btn" id="btn-italic" title="Italic (Ctrl+I)"><em>I</em></button>
      <button class="toolbar-btn" id="btn-underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button class="toolbar-btn" id="btn-get-text" title="Get Text Content">Get Text</button>
    </div>

    <!-- Create the Quill editor container -->
    <div class="main">
      <div id="editor"></div>
    </div>

    <script>
      // Initialize Quill editor
      const FontAttributor = Quill.import("formats/font");
      FontAttributor.whitelist = [
        "Times New Roman",
        "Roboto",
        "Poppins",
        "Montserrat",
        "Inconsolata",
      ];
      Quill.register(FontAttributor, true);

      const quill = new Quill("#editor", {
        placeholder: "Start typing here...",
        theme: "snow",
        modules: {
          toolbar: [
            [
              {
                font: [
                  "Times New Roman",
                  "Roboto",
                  "Poppins",
                  "Montserrat",
                  "Inconsolata",
                ],
              },
            ],
            ["bold", "italic", "underline", "strike"],
            ["blockquote", "code-block"],
            [{ header: [1, 2, 3, 4, false] }],
            [{ list: "ordered" }, { list: "bullet" }],
            [{ indent: "-1" }, { indent: "+1" }, { align: [] }],
            ["link", "image", "video"],
            ["clean", { color: [] }, { background: [] }],
          ],
          syntax: true, //Enable syntax highlighting
        },
      });

      // Make quill available globally
      window.quill = quill;

      // Basic toolbar functionality
      document.getElementById('btn-bold').addEventListener('click', function() {
        const format = quill.getFormat();
        quill.format('bold', !format.bold);
        this.classList.toggle('active', !format.bold);
      });

      document.getElementById('btn-italic').addEventListener('click', function() {
        const format = quill.getFormat();
        quill.format('italic', !format.italic);
        this.classList.toggle('active', !format.italic);
      });

      document.getElementById('btn-underline').addEventListener('click', function() {
        const format = quill.getFormat();
        quill.format('underline', !format.underline);
        this.classList.toggle('active', !format.underline);
      });

      document.getElementById('btn-get-text').addEventListener('click', function() {
        const text = quill.getText();
        if (window.ahk && window.ahk.get) {
          window.ahk.get(text);
        } else {
          alert('Text content: ' + text);
        }
      });

      // Functions for AHK integration
      function newFile() {
        quill.setContents([]);
        console.log('New file created');
      }

      function openFile() {
        if (window.ahk && window.ahk.OpenFile) {
          window.ahk.OpenFile();
        } else {
          console.log('Open file requested');
        }
      }

      function saveFile() {
        const html = quill.root.innerHTML;
        if (window.ahk && window.ahk.SaveFile) {
          window.ahk.SaveFile(html);
        } else {
          console.log('Save file requested');
        }
      }

      function passText() {
        const text = quill.getText();
        if (window.ahk && window.ahk.get) {
          window.ahk.get(text);
        } else {
          alert('Text content: ' + text);
        }
      }

      function exitApp() {
        if (window.ahk && window.ahk.exit) {
          window.ahk.exit();
        } else {
          console.log('Exit requested');
        }
      }

      function passHTML() {
        const html = quill.root.innerHTML;
        if (window.ahk && window.ahk.getHTML) {
          window.ahk.getHTML(html);
        } else {
          alert('HTML content: ' + html);
        }
      }

      function about() {
        if (window.ahk && window.ahk.about) {
          window.ahk.about();
        } else {
          alert('Quartz RTE - Rich Text Editor built with AutoHotkey and Quill.js');
        }
      }

      // Initialize when WebView is ready
      window.onload = function () {
        try {
          let obj = chrome.webview.hostObjects.ahk;
          console.log('WebView host objects initialized');
        } catch (e) {
          console.log('WebView not available, running in browser mode');
        }
      };

      // Keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey) {
          switch(e.key) {
            case 'b':
              e.preventDefault();
              document.getElementById('btn-bold').click();
              break;
            case 'i':
              e.preventDefault();
              document.getElementById('btn-italic').click();
              break;
            case 'u':
              e.preventDefault();
              document.getElementById('btn-underline').click();
              break;
            case 'n':
              e.preventDefault();
              newFile();
              break;
            case 'o':
              e.preventDefault();
              openFile();
              break;
            case 's':
              e.preventDefault();
              saveFile();
              break;
            case 't':
              e.preventDefault();
              passText();
              break;
            case 'h':
              e.preventDefault();
              passHTML();
              break;
            case 'q':
              e.preventDefault();
              exitApp();
              break;
          }
        }
      });
    </script>
    
    <!-- Bootstrap Components -->
    <script src="Bootstrap/sidebars.js"></script>
    <script src="Bootstrap/color-modes.js"></script>
  </body>
</html>
